version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: monthly
    labels:
      - ci
      - automated
    commit-message:
      prefix: chore
      include: scope
